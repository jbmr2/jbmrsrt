###############################################
# Global settings
###############################################

logLevel: info
logDestinations: [stdout]

###############################################
# Control API
###############################################

api: false # Disabled manager API

###############################################
# SRT server
###############################################

# Enable publishing and reading streams with the SRT protocol.
srt: true
# Address of the SRT listener.
srtAddress: :8554

###############################################
# HLS server (to view the stream in browser)
###############################################

hls: true
hlsAddress: :8888

###############################################
# WebRTC server
###############################################

webrtc: true
webrtcAddress: :8889

###############################################
# Path settings
###############################################

paths:
  # Single feed named "stream"
  stream:
    source: publisher
